name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Select a Xcode that actually has iPhoneOS SDK installed on the runner.
      - name: Select compatible Xcode for Expo SDK 55
        run: |
          echo "=== Available Xcode versions ==="
          ls /Applications/ | grep Xcode

          CANDIDATES=(
            "/Applications/Xcode_16.2.app"
            "/Applications/Xcode_16.1.app"
            "/Applications/Xcode_16.4.app"
            "/Applications/Xcode_16.3.app"
          )

          while IFS= read -r x; do
            CANDIDATES+=("$x")
          done < <(ls -d /Applications/Xcode_16.*.app 2>/dev/null | sort -V)

          DEFAULT_XCODE=$(xcode-select -p | sed 's|/Contents/Developer||')
          CANDIDATES+=("$DEFAULT_XCODE")

          XCODE_PATH=""
          for candidate in "${CANDIDATES[@]}"; do
            [ -d "$candidate" ] || continue
            echo "Trying: $candidate"
            sudo xcode-select -s "$candidate/Contents/Developer"
            if xcodebuild -showsdks | grep -q "iphoneos"; then
              XCODE_PATH="$candidate"
              break
            fi
            echo "Skipping $candidate (iphoneos SDK not installed)"
          done

          if [ -z "$XCODE_PATH" ]; then
            echo "ERROR: No Xcode with iPhoneOS SDK found on this runner"
            exit 1
          fi

          echo "=== Selected Xcode ==="
          echo "$XCODE_PATH"
          xcodebuild -version
          swift --version
          xcodebuild -showsdks

      - name: Prepare Xcode iOS platform tools
        run: |
          sudo xcodebuild -runFirstLaunch || true

          echo "Ensuring iOS platform components are installed..."
          sudo xcodebuild -downloadPlatform iOS || true

          echo "=== iOS SDK path ==="
          xcrun --sdk iphoneos --show-sdk-path
          echo "=== ibtool version ==="
          xcrun --sdk iphoneos ibtool --version

      - name: Install dependencies
        run: npm ci

      - name: Patch expo-modules-core for CI Swift compatibility
        run: |
          FILE1="node_modules/expo-modules-core/ios/Core/Views/SwiftUI/SwiftUIHostingView.swift"
          FILE2="node_modules/expo-modules-core/ios/Core/Views/ViewDefinition.swift"

          if [ -f "$FILE1" ]; then
            sed -i '' 's/: ExpoView, @MainActor AnyExpoSwiftUIHostingView/: ExpoView, AnyExpoSwiftUIHostingView/g' "$FILE1"
          fi

          if [ -f "$FILE2" ]; then
            sed -i '' 's/extension UIView: @MainActor AnyArgument/extension UIView: AnyArgument/g' "$FILE2"
          fi

          echo "Patched expo-modules-core Swift files for compatibility"

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Patch Podfile for Swift concurrency compatibility
        working-directory: ios
        run: |
          ruby <<'RUBY_SCRIPT'
          podfile_path = "Podfile"
          podfile = File.read(podfile_path)

          patch = <<~'PATCH'

              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
<<<<<<< HEAD
                  config.build_settings['SWIFT_VERSION'] = '5.10'
=======
>>>>>>> 4219534 (1)
                  config.build_settings['SWIFT_STRICT_CONCURRENCY'] = 'minimal'
                  flags = config.build_settings['OTHER_SWIFT_FLAGS'] || '$(inherited)'
                  unless flags.include?('-strict-concurrency=minimal')
                    config.build_settings['OTHER_SWIFT_FLAGS'] = "#{flags} -strict-concurrency=minimal"
                  end
                end
              end
          PATCH

          if podfile.include?("post_install do |installer|")
            podfile.sub!("post_install do |installer|", "post_install do |installer|\n#{patch}")
          else
            podfile += "\npost_install do |installer|\n#{patch}\nend\n"
          end

          File.write(podfile_path, podfile)
          puts "Patched Podfile for minimal strict concurrency"
          RUBY_SCRIPT

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build unsigned .app
        working-directory: ios
        run: |
          WORKSPACE=$(find . -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list 2>/dev/null | grep -A 100 "Schemes:" | tail -n +2 | head -1 | xargs)
          echo "Workspace: $WORKSPACE | Scheme: $SCHEME"

          build_once() {
            set -o pipefail
            xcodebuild \
              -workspace "$WORKSPACE" \
              -scheme "$SCHEME" \
              -configuration Release \
              -sdk iphoneos \
              -destination 'generic/platform=iOS' \
              -derivedDataPath build \
              -jobs $(sysctl -n hw.ncpu) \
              ARCHS=arm64 \
              ONLY_ACTIVE_ARCH=NO \
              CODE_SIGN_IDENTITY="-" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              AD_HOC_CODE_SIGNING_ALLOWED=YES \
              CODE_SIGN_ENTITLEMENTS="" \
              DEVELOPMENT_TEAM="" \
              PROVISIONING_PROFILE_SPECIFIER="" \
              SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
              COMPILER_INDEX_STORE_ENABLE=NO
          }

          set +e
          build_once 2>&1 | tee ../build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          if [ "$BUILD_EXIT" -ne 0 ] && grep -qE "Unable to find a destination|Found no destinations|Platform Not Installed|is not installed" ../build.log; then
            echo "Destination/platform issue detected. Downloading iOS platform and retrying once..."
            sudo xcodebuild -downloadPlatform iOS || true
            xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -showdestinations || true

            set +e
            build_once 2>&1 | tee -a ../build.log
            BUILD_EXIT=${PIPESTATUS[0]}
            set -e
          fi

          exit $BUILD_EXIT

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: build.log
          retention-days: 7

      - name: Create IPA from .app
        run: |
          APP_PATH=$(find ios/build -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found!"
            find ios/build -type d | head -30
            exit 1
          fi
          echo "Found: $APP_PATH ($(du -sh "$APP_PATH" | cut -f1))"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r ArraiaDosFofuras.ipa Payload
          echo "IPA: $(du -sh ArraiaDosFofuras.ipa | cut -f1)"
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArraiaDosFofuras-IPA
          path: ArraiaDosFofuras.ipa
          retention-days: 30
