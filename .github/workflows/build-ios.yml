name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # CRITICAL: Pin to Xcode 16.1 or 16.2 (Swift 6.0.x)
      # Expo SDK 55 is NOT compatible with Xcode 16.4+ (Swift 6.1)
      - name: Select Xcode 16.1
        run: |
          echo "=== Available Xcode versions ==="
          ls /Applications/ | grep Xcode
          if [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
          else
            echo "ERROR: No Xcode 16.0-16.2 found!"
            exit 1
          fi
          echo "=== Selected ==="
          xcodebuild -version
          swift --version

      - name: Install dependencies
        run: npm ci

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --clean --no-install

      # Patch the Podfile BEFORE pod install so CocoaPods
      # generates correct settings from the start
      - name: Patch Podfile for Swift 6 compatibility
        working-directory: ios
        run: |
          ruby <<'RUBY_SCRIPT'
          podfile = File.read("Podfile")

          patch = <<~'PATCH'

              # === SWIFT 6 COMPATIBILITY (injected by CI) ===
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['SWIFT_VERSION'] = '6'
                  config.build_settings['SWIFT_STRICT_CONCURRENCY'] = 'minimal'
                  # Also inject compiler flag directly for maximum reliability
                  flags = config.build_settings['OTHER_SWIFT_FLAGS'] || '$(inherited)'
                  unless flags.include?('-strict-concurrency')
                    config.build_settings['OTHER_SWIFT_FLAGS'] = "#{flags} -strict-concurrency=minimal"
                  end
                end
              end
              # === END SWIFT 6 PATCH ===
          PATCH

          if podfile.include?("post_install do |installer|")
            # Inject right after the post_install opening line
            podfile.sub!("post_install do |installer|", "post_install do |installer|\n#{patch}")
            File.write("Podfile", podfile)
            puts "SUCCESS: Injected Swift 6 patch into existing post_install block"
          else
            # Create a new post_install block
            podfile += "\npost_install do |installer|\n#{patch}\nend\n"
            File.write("Podfile", podfile)
            puts "SUCCESS: Added new post_install block with Swift 6 patch"
          end
          RUBY_SCRIPT

          echo "=== Podfile post_install section ==="
          grep -A 25 "post_install" Podfile | head -35

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      # Verify the patches were applied by CocoaPods post_install
      - name: Verify Swift build settings
        working-directory: ios
        run: |
          echo "=== ExpoModulesCore xcconfig ==="
          find Pods/Target\ Support\ Files -path "*ExpoModulesCore*" -name "*.xcconfig" | while read f; do
            echo "--- $f ---"
            grep -iE "SWIFT_VERSION|SWIFT_STRICT|OTHER_SWIFT" "$f" || echo "(no Swift settings)"
          done

          echo ""
          echo "=== Unique SWIFT_VERSION in all xcconfigs ==="
          grep -rh "SWIFT_VERSION" Pods/Target\ Support\ Files/ 2>/dev/null | sort -u

          echo ""
          echo "=== ExpoModulesCore target settings in Pods.xcodeproj ==="
          ruby -e '
          require "xcodeproj"
          project = Xcodeproj::Project.open("Pods/Pods.xcodeproj")
          target = project.targets.find { |t| t.name == "ExpoModulesCore" }
          if target
            target.build_configurations.each do |config|
              puts "#{config.name}: SWIFT_VERSION=#{config.build_settings["SWIFT_VERSION"]} STRICT_CONCURRENCY=#{config.build_settings["SWIFT_STRICT_CONCURRENCY"]}"
            end
          else
            puts "ExpoModulesCore target not found"
            puts "Available targets: #{project.targets.map(&:name).join(", ")}"
          end
          '

      - name: Build unsigned .app
        working-directory: ios
        run: |
          WORKSPACE=$(find . -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list 2>/dev/null | grep -A 100 "Schemes:" | tail -n +2 | head -1 | xargs)
          echo "Workspace: $WORKSPACE | Scheme: $SCHEME"

          set -o pipefail
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            -jobs $(sysctl -n hw.ncpu) \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee ../build.log

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: build.log
          retention-days: 7

      - name: Create IPA from .app
        run: |
          APP_PATH=$(find ios/build -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found!"
            find ios/build -type d | head -30
            exit 1
          fi
          echo "Found: $APP_PATH ($(du -sh "$APP_PATH" | cut -f1))"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r ArraiaDosFofuras.ipa Payload
          echo "IPA: $(du -sh ArraiaDosFofuras.ipa | cut -f1)"
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArraiaDosFofuras-IPA
          path: ArraiaDosFofuras.ipa
          retention-days: 30
