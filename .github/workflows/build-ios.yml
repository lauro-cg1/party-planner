name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate native iOS project (expo prebuild)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Build unsigned .app
        working-directory: ios
        run: |
          xcodebuild \
            -workspace ArraidosFofuras.xcworkspace \
            -scheme ArraidosFofuras \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            -allowProvisioningUpdates \
            | tail -20

      - name: Create IPA from .app
        run: |
          mkdir -p Payload
          cp -r ios/build/Build/Products/Release-iphoneos/ArraidosFofuras.app Payload/
          zip -r PartyPlanner.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PartyPlanner-IPA
          path: PartyPlanner.ipa
          retention-days: 30
