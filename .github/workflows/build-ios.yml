name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Select Xcode 16
        run: |
          ls /Applications/ | grep Xcode
          XCODE=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          echo "Selected: $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Install dependencies
        run: npm ci

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Force Swift 6 + minimal concurrency on ALL targets
        working-directory: ios
        run: |
          echo "=== Patching xcconfig files ==="
          PATCHED=0
          find Pods/Target\ Support\ Files -name "*.xcconfig" | while read f; do
            # Remove existing SWIFT_VERSION lines to avoid conflicts
            sed -i '' '/^SWIFT_VERSION /d' "$f"
            # Append Swift 6 + minimal concurrency
            echo "" >> "$f"
            echo "SWIFT_VERSION = 6" >> "$f"
            echo "SWIFT_STRICT_CONCURRENCY = minimal" >> "$f"
            PATCHED=$((PATCHED + 1))
          done
          echo "Patched xcconfig files"

          # Also patch the main project xcconfig if it exists
          find . -maxdepth 1 -name "*.xcconfig" -exec sh -c '
            sed -i "" "/^SWIFT_VERSION /d" "$1"
            echo "" >> "$1"
            echo "SWIFT_VERSION = 6" >> "$1"
            echo "SWIFT_STRICT_CONCURRENCY = minimal" >> "$1"
          ' _ {} \;

          # Patch Pods.xcodeproj build settings too (belt and suspenders)
          ruby <<'RUBY'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('Pods/Pods.xcodeproj')
          project.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings['SWIFT_VERSION'] = '6'
              config.build_settings['SWIFT_STRICT_CONCURRENCY'] = 'minimal'
            end
          end
          project.save
          puts "Patched #{project.targets.count} pod targets in Pods.xcodeproj"
          RUBY

          # Also patch the main app project
          APP_PROJ=$(find . -name "*.xcodeproj" -not -path "*/Pods/*" | head -1)
          if [ -n "$APP_PROJ" ]; then
            ruby - "$APP_PROJ" <<'RUBY'
            require 'xcodeproj'
            project = Xcodeproj::Project.open(ARGV[0])
            project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['SWIFT_VERSION'] = '6'
                config.build_settings['SWIFT_STRICT_CONCURRENCY'] = 'minimal'
              end
            end
            project.save
            puts "Patched #{project.targets.count} app targets in #{ARGV[0]}"
            RUBY
          fi

          # Verify patch was applied
          echo "=== Verification: sample xcconfig ==="
          SAMPLE=$(find Pods/Target\ Support\ Files -name "*ExpoModulesCore*release*" -o -name "*ExpoModulesCore*.release.xcconfig" | head -1)
          if [ -n "$SAMPLE" ]; then
            echo "File: $SAMPLE"
            grep -i "SWIFT" "$SAMPLE" || echo "No SWIFT settings found in sample"
          fi
          echo "=== All SWIFT_VERSION values in xcconfigs ==="
          grep -r "SWIFT_VERSION" Pods/Target\ Support\ Files/ | head -20

      - name: Build unsigned .app
        working-directory: ios
        run: |
          WORKSPACE=$(find . -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list 2>/dev/null | grep -A 100 "Schemes:" | tail -n +2 | head -1 | xargs)
          echo "Workspace: $WORKSPACE | Scheme: $SCHEME"

          set -o pipefail
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            -jobs $(sysctl -n hw.ncpu) \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee ../build.log

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: build.log
          retention-days: 7

      - name: Create IPA from .app
        run: |
          APP_PATH=$(find ios/build -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found!"
            find ios/build -type d | head -30
            exit 1
          fi
          echo "Found: $APP_PATH ($(du -sh "$APP_PATH" | cut -f1))"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r ArraiaDosFofuras.ipa Payload
          echo "IPA: $(du -sh ArraiaDosFofuras.ipa | cut -f1)"
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArraiaDosFofuras-IPA
          path: ArraiaDosFofuras.ipa
          retention-days: 30
