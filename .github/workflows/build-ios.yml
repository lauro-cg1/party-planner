name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Select Xcode 16
        run: |
          ls /Applications/ | grep Xcode
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer || \
          sudo xcode-select -s "$(ls -d /Applications/Xcode_16*.app | head -1)/Contents/Developer"
          xcodebuild -version

      - name: Install dependencies
        run: npm ci

      - name: Generate native iOS project (expo prebuild)
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: List iOS project structure
        run: |
          echo "=== iOS directory ==="
          ls -la ios/
          echo "=== Workspace files ==="
          find ios -name "*.xcworkspace" -maxdepth 1
          echo "=== Schemes ==="
          find ios -path "*/xcschemes/*.xcscheme" | head -10

      - name: Build unsigned .app
        working-directory: ios
        run: |
          WORKSPACE=$(find . -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list 2>/dev/null | grep -A 100 "Schemes:" | tail -n +2 | head -1 | xargs)
          echo "Using workspace: $WORKSPACE"
          echo "Using scheme: $SCHEME"

          set -o pipefail
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            -jobs $(sysctl -n hw.ncpu) \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            SWIFT_VERSION=5.0 \
            SWIFT_STRICT_CONCURRENCY=minimal \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee ../build.log

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: build.log
          retention-days: 7

      - name: Create IPA from .app
        run: |
          echo "=== Build output ==="
          find ios/build -name "*.app" -type d
          APP_PATH=$(find ios/build -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in build output!"
            find ios/build -type d | head -30
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          echo "App size: $(du -sh "$APP_PATH" | cut -f1)"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r ArraiaDosFofuras.ipa Payload
          echo "IPA size: $(du -sh ArraiaDosFofuras.ipa | cut -f1)"
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArraiaDosFofuras-IPA
          path: ArraiaDosFofuras.ipa
          retention-days: 30
